name: CD

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_TYPE: KEXT
  LILU_VERSION: "1.7.2"
  VSMC_VERSION: "1.3.7"

jobs:
  build:
    name: Build
    runs-on: macos-15
    permissions:
      contents: write
    env:
      JOB_TYPE: BUILD
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          
      - name: Fetch Dependencies 
        run: |
          curl -LfsO https://github.com/acidanthera/Lilu/releases/download/${{ env.LILU_VERSION }}/Lilu-${{ env.LILU_VERSION }}-DEBUG.zip
          unzip -q -o Lilu-${{ env.LILU_VERSION }}-DEBUG.zip
          curl -LfsO https://github.com/acidanthera/VirtualSMC/releases/download/${{ env.VSMC_VERSION }}/VirtualSMC-${{ env.VSMC_VERSION }}-DEBUG.zip
          unzip -q -o VirtualSMC-${{ env.VSMC_VERSION }}-DEBUG.zip
          cp -R Kexts/VirtualSMC.kext ./ 2>/dev/null || true
          [ -d MacKernelSDK/Headers ] || git clone --depth 1 https://github.com/acidanthera/MacKernelSDK.git
          
      - name: Build AMDRyzenCPUPowerManagement
        run: xcodebuild -scheme "AMDRyzenCPUPowerManagement" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build
        
      - name: Build APGLaunchHelper
        run: xcodebuild -scheme "APGLaunchHelper" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Build AMD Power Gadget
        run: xcodebuild -scheme "AMD Power Gadget" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Build SMCAMDProcessor
        run: xcodebuild -scheme "SMCAMDProcessor" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Archive Artifacts
        run: |
          rm -rf build/Build/Products/Release/*.dSYM
          rm -rf build/Build/Products/Release/*.swiftmodule
          rm -rf build/Build/Products/Release/APGLaunchHelper*
          zip -r build/Release.zip build/Build/Products/Release
        
      - name: Upload to Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/Release.zip

      - name: Extract Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          awk -v tag="## ${{ github.ref_name }}" '$0 ~ tag {flag=1; print; next} /^## v/ {flag=0} flag' CHANGELOG.md > build/release_notes.md

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/Release.zip
          body_path: build/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


