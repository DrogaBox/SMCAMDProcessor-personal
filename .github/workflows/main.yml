name: CD

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_TYPE: KEXT

jobs:
  build:
    name: Build
    runs-on: macos-15
    permissions:
      contents: write
    env:
      JOB_TYPE: BUILD
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          
      - name: Fetch Dependencies 
        run: |
          curl -LfsO https://github.com/acidanthera/Lilu/releases/download/1.7.2/Lilu-1.7.2-RELEASE.zip
          unzip -q -o Lilu-1.7.2-RELEASE.zip
          curl -LfsO https://github.com/acidanthera/VirtualSMC/releases/download/1.3.7/VirtualSMC-1.3.7-RELEASE.zip
          unzip -q -o VirtualSMC-1.3.7-RELEASE.zip
          git clone --depth 1 https://github.com/acidanthera/MacKernelSDK.git
          
      - name: Build AMDRyzenCPUPowerManagement
        run: xcodebuild -scheme "AMDRyzenCPUPowerManagement" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build
        
      - name: Build APGLaunchHelper
        run: xcodebuild -scheme "APGLaunchHelper" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Build AMD Power Gadget
        run: xcodebuild -scheme "AMD Power Gadget" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Build SMCAMDProcessor
        run: xcodebuild -scheme "SMCAMDProcessor" -jobs 1 -arch x86_64 -configuration Release -derivedDataPath ./build

      - name: Archive Artifacts
        run: |
          rm -rf build/Build/Products/Release/*.dSYM
          rm -rf build/Build/Products/Release/*.swiftmodule
          rm -rf build/Build/Products/Release/APGLaunchHelper*
          zip -r build/Release.zip build/Build/Products/Release
        
      - name: Upload to Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/Release.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


