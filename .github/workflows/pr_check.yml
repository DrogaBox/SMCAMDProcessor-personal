name: PR Check

on:
  pull_request:
    branches: [ master ]

jobs:
  compile-check:
    name: Verify all targets compile
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Download Lilu & VirtualSMC dependencies
        run: |
          curl -L -o Lilu.zip "https://github.com/acidanthera/Lilu/releases/download/1.7.2/Lilu-1.7.2-RELEASE.zip"
          unzip -q Lilu.zip -d Lilu_extracted
          mv Lilu_extracted/Lilu.kext .
          rm -rf Lilu.zip Lilu_extracted

          curl -L -o VirtualSMC.zip "https://github.com/acidanthera/VirtualSMC/releases/download/1.3.7/VirtualSMC-1.3.7-RELEASE.zip"
          unzip -q VirtualSMC.zip -d SMC_extracted
          mv SMC_extracted/Kexts/VirtualSMC.kext .
          rm -rf VirtualSMC.zip SMC_extracted

      - name: Build AMDRyzenCPUPowerManagement.kext
        run: |
          xcodebuild \
            -workspace SMCAMDProcessor.xcodeproj/project.xcworkspace \
            -scheme AMDRyzenCPUPowerManagement \
            -configuration Release \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED"

      - name: Build SMCAMDProcessor.kext
        run: |
          xcodebuild \
            -workspace SMCAMDProcessor.xcodeproj/project.xcworkspace \
            -scheme SMCAMDProcessor \
            -configuration Release \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED"

      - name: Build AMD Power Gadget.app
        run: |
          xcodebuild \
            -workspace SMCAMDProcessor.xcodeproj/project.xcworkspace \
            -scheme "AMD Power Gadget" \
            -configuration Release \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED"
