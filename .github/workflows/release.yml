name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build all targets
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Download Lilu & VirtualSMC dependencies
        run: |
          curl -L -o Lilu.zip "https://github.com/acidanthera/Lilu/releases/download/1.7.2/Lilu-1.7.2-RELEASE.zip"
          unzip -q Lilu.zip -d Lilu_extracted
          mv Lilu_extracted/Lilu.kext .
          rm -rf Lilu.zip Lilu_extracted

          curl -L -o VirtualSMC.zip "https://github.com/acidanthera/VirtualSMC/releases/download/1.3.7/VirtualSMC-1.3.7-RELEASE.zip"
          unzip -q VirtualSMC.zip -d SMC_extracted
          mv SMC_extracted/Kexts/VirtualSMC.kext .
          rm -rf VirtualSMC.zip SMC_extracted

      - name: Build AMDRyzenCPUPowerManagement.kext
        run: |
          xcodebuild -scheme "AMDRyzenCPUPowerManagement" -jobs 1 -arch x86_64 -arch ACID32 -configuration Release -derivedDataPath ./build

      - name: Build SMCAMDProcessor.kext
        run: |
          xcodebuild -scheme "SMCAMDProcessor" -jobs 1 -arch x86_64 -arch ACID32 -configuration Release -derivedDataPath ./build

      - name: Build AMD Power Gadget.app
        run: |
          xcodebuild -scheme "AMD Power Gadget" -jobs 1 -arch x86_64 -arch ACID32 -configuration Release -derivedDataPath ./build

      - name: Package binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p "Binaries_Release/$TAG"
          cp -R "build/Build/Products/Release/AMDRyzenCPUPowerManagement.kext" "Binaries_Release/$TAG/"
          cp -R "build/Build/Products/Release/SMCAMDProcessor.kext"             "Binaries_Release/$TAG/"
          cp -R "build/Build/Products/Release/AMD Power Gadget.app"             "Binaries_Release/$TAG/"
          zip -r "Binaries_Release_${TAG}.zip" "Binaries_Release/$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            Binaries_Release_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
