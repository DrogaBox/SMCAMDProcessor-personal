name: CI
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Fetch Dependencies 
        run: |
          curl -LfsO https://github.com/acidanthera/Lilu/releases/download/1.7.2/Lilu-1.7.2-DEBUG.zip
          unzip -q -o Lilu-1.7.2-DEBUG.zip
          curl -LfsO https://github.com/acidanthera/VirtualSMC/releases/download/1.3.7/VirtualSMC-1.3.7-DEBUG.zip
          unzip -q -o VirtualSMC-1.3.7-DEBUG.zip
          cp -R Kexts/VirtualSMC.kext ./ 2>/dev/null || true
          [ -d MacKernelSDK/Headers ] || git clone --depth 1 https://github.com/acidanthera/MacKernelSDK.git

      - name: Build AMDRyzenCPUPowerManagement
        run: |
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme AMDRyzenCPUPowerManagement -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build clean build

      - name: Build SMCAMDProcessor
        run: |
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme SMCAMDProcessor -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build clean build

      - name: Build AMD Power Gadget
        run: |
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme "AMD Power Gadget" -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build clean build

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            build/Build/Products/Release/*.kext
            build/Build/Products/Release/AMD Power Gadget.app

